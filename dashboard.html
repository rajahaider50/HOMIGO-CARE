<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homigo Care | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #ec4899;
            --dark-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--dark-bg);
            color: #f8fafc;
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 110px;
            overflow-x: hidden;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.08) 0px, transparent 50%);
            z-index: -1;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            margin-bottom: 25px;
        }

        .header-logo {
            height: 50px; /* Adjusted for taller svg as per request */
            width: auto;
            max-width: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3));
        }

        .menu-dots {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        /* Welcome Section */
        .welcome-sec { margin-bottom: 25px; padding-left: 5px; }
        .welcome-sec h1 { font-size: 26px; font-weight: 700; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-sec p { color: #64748b; font-size: 14px; margin-top: 5px; }

        /* 2x2 Professional Grid */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
        }

        .service-card:active { transform: scale(0.92); background: rgba(99, 102, 241, 0.1); }

        .icon-box {
            width: 65px; height: 65px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .service-card svg { width: 32px; height: 32px; stroke: var(--primary); stroke-width: 2.2; }
        .service-card span { font-weight: 600; font-size: 15px; letter-spacing: 0.3px; }

        /* Bottom Navigation Bar */
        .nav-container {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 15px 20px 25px;
            background: linear-gradient(to top, var(--dark-bg) 80%, transparent);
            z-index: 999;
        }

        .bottom-nav {
            height: 70px;
            background: var(--nav-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #475569;
            transition: 0.3s;
            flex: 1;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* WhatsApp Style Floating Plus Button */
        .fab-container {
            position: absolute;
            top: -35px; /* Floating above the nav */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
        }

        .plus-btn {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
            cursor: pointer;
            border: 4px solid var(--dark-bg);
            transition: 0.3s;
        }

        .plus-btn:active { transform: scale(0.9); }
        .plus-btn svg { width: 30px; height: 30px; stroke: white; stroke-width: 3.5; }

        /* Action Menu (Modal Style) */
        .action-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .action-menu {
            width: 85%;
            background: var(--nav-bg);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .menu-option {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            border: 1px solid var(--border);
        }

    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <!-- Top Bar -->
    <header class="top-bar">
        <img src="avatar.svg" alt="User Logo" class="header-logo" onerror="this.src='1000397931.jpg'">
        <div class="menu-dots" onclick="toggleMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <circle cx="12" cy="5" r="1.5"></circle>
                <circle cx="12" cy="12" r="1.5"></circle>
                <circle cx="12" cy="19" r="1.5"></circle>
            </svg>
        </div>
    </header>

    <!-- Welcome -->
    <section class="welcome-sec">
        <h1 id="userDisplay">Welcome Back</h1>
        <p>Your Health, Our Priority</p>
    </section>

    <!-- Services Grid -->
    <div class="services-grid">
        <a href="view.html?type=Doctor" class="service-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="18" y1="8" x2="23" y2="13"></line><line x1="23" y1="8" x2="18" y2="13"></line></svg>
            </div>
            <span>Doctor</span>
        </a>

        <a href="view.html?type=Lab" class="service-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 2v8l-6 11h16l-6-11V2h-4z"></path><path d="M6 16h12"></path></svg>
            </div>
            <span>Lab Test</span>
        </a>

        <a href="view.html?type=Medical" class="service-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            </div>
            <span>Medical</span>
        </a>

        <a href="view.html?type=Hospital" class="service-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20"></path><path d="M2 12h20"></path></svg>
            </div>
            <span>Hospital</span>
        </a>
    </div>

    <!-- Bottom Nav -->
    <div class="nav-container">
        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                <span>Home</span>
            </a>
            <a href="booking.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span>Booking</span>
            </a>

            <!-- WhatsApp style Floating Button inside nav area -->
            <div class="fab-container">
                <div class="plus-btn" onclick="toggleMenu()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
            </div>

            <a href="chat.html" class="nav-item" style="margin-left: 50px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                <span>Chat</span>
            </a>
            <a href="profile.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </div>
    </div>

    <!-- Overlay Menu -->
    <div id="actionOverlay" class="action-overlay" onclick="toggleMenu()">
        <div class="action-menu" onclick="event.stopPropagation()">
            <a href="booking.html" class="menu-option">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line></svg>
                <span>Bookings</span>
            </a>
            <a href="chat.html" class="menu-option">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Live Chat</span>
            </a>
            <a href="profile.html" class="menu-option">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
                <span>Profile Settings</span>
            </a>
            <a href="view.html?type=Specialist" class="menu-option">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span>Specialists</span>
            </a>
            <div style="grid-column: span 2; text-align: center; color: #64748b; font-size: 12px; margin-top: 10px;">Close Menu</div>
        </div>
    </div>

    <script>
        // Load User Name
        const data = JSON.parse(localStorage.getItem('temp_user') || '{}');
        if(data.name) document.getElementById('userDisplay').innerText = `Hello, ${data.name.split(' ')[0]}!`;

        function toggleMenu() {
            const overlay = document.getElementById('actionOverlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
