<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Hub | Homigo Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --dark-bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        /* Prevent Horizontal Scrolling */
        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at top, rgba(99, 102, 241, 0.1), transparent 300px);
            min-height: 100vh;
        }

        /* Centralized Container */
        .container {
            width: 100%;
            max-width: 450px; /* Optimized for mobile screens */
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px 5px;
        }

        .back-btn {
            width: 42px; height: 42px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .title-section h1 {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Centered Grid */
        .hub-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .hub-card {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center; /* Center content vertically */
            text-align: center;
            transition: 0.2s;
        }

        .hub-card:active {
            border-color: var(--neon-blue);
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .icon-wrapper {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
        }

        .icon-wrapper svg { width: 28px; height: 28px; }

        .card-info span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .card-info h3 { font-size: 16px; margin-top: 4px; font-weight: 600; }

        /* Actions Centering */
        .actions-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            width: 100%;
        }

        .btn-link {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }

        .btn-wa { background: #25D366; color: white; }
        .btn-outline { border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-phone { background: var(--primary); color: white; }

        /* Form Design - Full Width within Container */
        .contact-form {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 100px;
        }

        .contact-form h2 { font-size: 18px; margin-bottom: 15px; text-align: center; }

        .input-group { margin-bottom: 12px; width: 100%; }
        .input-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; margin-left: 5px; }

        .input-group input, .input-group textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-family: inherit;
            outline: none;
        }

        .input-group input:focus { border-color: var(--neon-blue); }

        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--neon-purple));
            color: white; border: none; padding: 15px;
            border-radius: 15px; font-weight: 700; font-size: 14px;
            cursor: pointer; margin-top: 10px;
        }

        /* Fixed Bottom Button */
        .footer-action {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 15px 20px 30px;
            background: linear-gradient(to top, var(--dark-bg) 90%, transparent);
            z-index: 100; display: flex; justify-content: center;
        }

        .exit-btn {
            width: 100%; max-width: 400px;
            background: rgba(255,255,255,0.05);
            color: #fff; border: 1px solid var(--border); padding: 15px;
            border-radius: 15px; font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->

        <!-- Feedback Form -->
        <div class="contact-form">
            <h2>Quick Inquiry</h2>
            <form id="fForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="3" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Secure Message</button>
            </form>
        </div>
    </div>

    <!-- Fixed Exit -->
    <div class="footer-action">
        <button class="exit-btn" onclick="navToLogin()">Back to Login</button>
    </div>

    <script>
        function navToLogin() {
            window.location.href = 'login.html';
        }

        document.getElementById('fForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            btn.innerText = 'Sent Successfully!';
            btn.style.background = '#22c55e';
            setTimeout(() => {
                this.reset();
                btn.innerText = 'Send Secure Message';
                btn.style.background = 'linear-gradient(90deg, #6366f1, #7000ff)';
            }, 2000);
        });

        // Block accidental scrolling
        window.onpopstate = function() {
            window.location.href = 'login.html';
        };
        history.pushState(null, null, window.location.href);
    </script>
</body>
</html>
