<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password | Homigo Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #ec4899;
            --dark-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --link-color: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--dark-bg);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            z-index: -1;
            filter: blur(80px);
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 24px;
            width: 100%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-box {
            display: inline-block;
            padding: 18px;
            background: rgba(236, 72, 153, 0.1);
            border-radius: 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(236, 72, 153, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .icon-box img {
            height: 60px;
            width: 60px;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        .input-field {
            width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding-left: 54px; padding-right: 20px;
            color: white; font-size: 16px; transition: 0.3s;
        }

        .input-field:focus { outline: none; border-color: var(--primary); background: rgba(255, 255, 255, 0.07); }
        
        .field-icon { position: absolute; left: 18px; top: 18px; color: rgba(255, 255, 255, 0.3); }

        .action-btn {
            width: 100%; height: 60px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none; border-radius: 18px;
            color: white; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-to-login {
            display: inline-block;
            margin-top: 25px;
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-to-login:hover { color: white; }

        #step2 { display: none; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 24px;
            border-radius: 50px; font-size: 14px; font-weight: 700;
            display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .success-checkmark {
            color: #22c55e;
            font-size: 50px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div id="toast"></div>

    <div class="auth-card">
        <div class="icon-box">
            <img src="forget.svg" alt="Reset Icon" onerror="this.src='1000397813.jpg'">
        </div>

        <!-- Step 1: Verify Phone Number -->
        <div id="step1">
            <h1>Forgot Password</h1>
            <p class="subtitle">Enter your registered phone number to <br> reset your security credentials.</p>
            
            <form id="verifyForm">
                <div class="input-group">
                    <input type="tel" id="phoneInput" class="input-field" placeholder="Phone Number" required>
                    <svg class="field-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                </div>
                <button type="submit" class="action-btn">
                    Check Identity
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Step 2: Change Password -->
        <div id="step2">
            <h1>New Password</h1>
            <p class="subtitle">Create a strong password to protect <br> your account access.</p>
            
            <form id="resetForm">
                <div class="input-group">
                    <input type="password" id="newPass" class="input-field" placeholder="New Password" required minlength="6">
                    <svg class="field-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPass" class="input-field" placeholder="Confirm Password" required minlength="6">
                    <svg class="field-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <button type="submit" class="action-btn">
                    Update Password
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M20 6L9 17l-5-5"></path>
                    </svg>
                </button>
            </form>
        </div>

        <a href="login.html" class="back-to-login">Back to Sign In</a>
    </div>

    <script>
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        let verifiedUserPhone = "";

        // Function to show Toast
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Step 1: Verify Phone Logic
        document.getElementById('verifyForm').onsubmit = (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneInput').value;

            // Checking in LocalStorage (Simulation of account check)
            // If you have a real sign-up system, you would check against registered numbers
            // For now, we allow any valid looking number for the flow
            if(phone.length >= 10) {
                showToast("Identity Found. You can reset now.");
                verifiedUserPhone = phone;
                
                // Animation to transition
                step1.style.opacity = '0';
                setTimeout(() => {
                    step1.style.display = 'none';
                    step2.style.display = 'block';
                    step2.style.opacity = '1';
                }, 400);
            } else {
                showToast("Account not found with this number.");
            }
        };

        // Step 2: Reset Password Logic
        document.getElementById('resetForm').onsubmit = (e) => {
            e.preventDefault();
            const pass1 = document.getElementById('newPass').value;
            const pass2 = document.getElementById('confirmPass').value;

            if(pass1 !== pass2) {
                showToast("Passwords do not match!");
                return;
            }

            // Update logic (Simulation)
            showToast("Password Updated Successfully!");
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        };
    </script>
</body>
</html>
