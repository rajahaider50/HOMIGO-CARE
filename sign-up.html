<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Account | Homigo Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #ec4899;
            --dark-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --link-color: #38bdf8;
            --whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--dark-bg);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            z-index: -1;
            filter: blur(80px);
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 24px;
            width: 90%;
            max-width: 440px;
            margin: 40px 0 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-box { display: inline-block; padding: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; margin-bottom: 20px; }
        .logo-box img { height: 50px; }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 18px; text-align: left; }
        .input-field {
            width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding-left: 54px; padding-right: 20px;
            color: white; font-size: 16px; transition: 0.3s;
        }
        .input-field:focus { outline: none; border-color: var(--primary); background: rgba(255, 255, 255, 0.07); }
        .field-icon { position: absolute; left: 18px; top: 18px; color: rgba(255, 255, 255, 0.3); }

        /* OTP Method Selection */
        .method-label {
            display: block; text-align: left; font-size: 13px; font-weight: 600;
            color: #94a3b8; margin-bottom: 12px; padding-left: 5px;
        }

        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        
        .method-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .method-card.active {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .method-card svg { width: 28px; height: 28px; }
        .method-card span { font-size: 12px; font-weight: 700; }

        .action-btn {
            width: 100%; height: 60px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none; border-radius: 18px;
            color: white; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.98); }

        .footer-text { margin-top: 25px; color: #94a3b8; font-size: 14px; }
        .footer-text a { color: white; font-weight: 700; text-decoration: none; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 24px;
            border-radius: 50px; font-size: 14px; font-weight: 700;
            display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div id="toast"></div>

    <div class="auth-card">
        <div class="logo-box">
            <img src="logo.svg" alt="Logo" onerror="this.src='1000397811.jpg'">
        </div>
        <h1>Join the Elite</h1>
        <p class="subtitle">Experience the future of healthcare</p>

        <form id="signupForm">
            <!-- Username -->
            <div class="input-group">
                <input type="text" id="username" class="input-field" placeholder="Full Name" required>
                <svg class="field-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>

            <!-- Phone -->
            <div class="input-group">
                <input type="tel" id="phone" class="input-field" placeholder="Phone Number" required>
                <svg class="field-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
            </div>

            <!-- Password -->
            <div class="input-group">
                <input type="password" id="password" class="input-field" placeholder="Create Password" required>
                <svg class="field-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <span class="method-label">Verify via:</span>
            <div class="method-grid">
                <!-- SMS Option -->
                <div class="method-card active" onclick="selectMethod('sms')" id="sms-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>SMS OTP</span>
                </div>
                <!-- WhatsApp Option -->
                <div class="method-card" onclick="selectMethod('whatsapp')" id="whatsapp-card">
                    <svg viewBox="0 0 448 512" fill="currentColor">
                        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.2-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.5-9.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.5 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                    </svg>
                    <span>WhatsApp</span>
                </div>
            </div>

            <button type="submit" class="action-btn">
                Verify Identity
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { firebaseConfig } from "./firebase-config.js";

        let selectedMethod = 'sms';

        window.selectMethod = (method) => {
            selectedMethod = method;
            document.getElementById('sms-card').classList.remove('active');
            document.getElementById('whatsapp-card').classList.remove('active');
            document.getElementById(method + '-card').classList.add('active');
        };

        document.getElementById('signupForm').onsubmit = (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('password').value;

            if (phone.length < 10) {
                showToast("Please enter a valid number");
                return;
            }

            // Storing temporary data for OTP page
            localStorage.setItem('temp_user', JSON.stringify({
                name: username,
                phone: phone,
                method: selectedMethod
            }));

            showToast(`Sending OTP to ${selectedMethod.toUpperCase()}...`);
            
            setTimeout(() => {
                window.location.href = 'otp-verify.html';
            }, 1500);
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
